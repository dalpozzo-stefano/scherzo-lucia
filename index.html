<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wi-Fi Gratuito</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
    </style>
</head>
<body>

    <img id="foto-imbarazzante" src="" alt="Caricamento Wi-Fi...">

    <script>
        // MODIFICA QUESTO NUMERO: metti il totale delle foto che hai caricato
        const totaleFoto = 6; 

        // Sceglie un numero a caso tra 1 e il totale delle foto
        const numeroCasuale = Math.floor(Math.random() * totaleFoto) + 1;
        
        // Costruisce il nome del file (es. foto3.jpg)
        const nomeFoto = numeroCasuale + '.jpeg';
        
        // Mostra la foto nella pagina
        document.getElementById('foto-imbarazzante').src = nomeFoto;
    </script>
</body>
</html>
